sonar.projectKey=travelmate-ui
sonar.projectName=TravelMate UI
sonar.projectVersion=1.0

# SonarQube server — default local Docker port
sonar.host.url=http://localhost:9000

# Generate token from: SonarQube → My Account → Security → Generate Token
# Then paste it here (or pass via command line: -Dsonar.token=YOUR_TOKEN)
sonar.token=squ_2c43124454e2debf74c835bfe2d92b947e1d0d47

# Source & test configuration
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/*.test.js
sonar.sourceEncoding=UTF-8

# Coverage report (generated by: npm run test:coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclude non-analysable files
sonar.exclusions=src/index.js,src/reportWebVitals.js,src/pages/TripPage.js,src/pages/Booking.js,src/App.js
